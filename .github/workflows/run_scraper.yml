name: Run Craigslist Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'   # Daily 7:00 AM UTC = 3:00 AM EDT

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Set run date
        run: echo "RUN_DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run scraper
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          RUN_DATE: ${{ env.RUN_DATE }}
        run: python scraper.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: craigslist-${{ env.RUN_DATE }}
          path: |
            FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/CSV/
            FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/JSON/
            FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/craper.log
          retention-days: 90
