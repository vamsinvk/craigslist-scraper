name: Craigslist Scraper

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-craigslist-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-craigslist-

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Set run date
        run: echo "RUN_DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run Craigslist scraper
        env:
          PROXY_URL:          ${{ secrets.PROXY_URL }}
          RUN_DATE:           ${{ env.RUN_DATE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scrapers/craigslist_scraper.py

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: craigslist-csv-${{ env.RUN_DATE }}
          path: FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/CSV/
          retention-days: 30

      - name: Upload JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: craigslist-json-${{ env.RUN_DATE }}
          path: FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/JSON/
          retention-days: 30

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: craigslist-log-${{ env.RUN_DATE }}
          path: FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/scraper.log
          retention-days: 30

      - name: Notify Telegram — success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Craigslist Scraper Done*
          📅 Date: ${{ env.RUN_DATE }}
          🔗 [View Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Notify Telegram — failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Craigslist Scraper FAILED*
          📅 Date: ${{ env.RUN_DATE }}
          🔗 [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Commit and push results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FSBO/Craigslist/DATA/ || true
          git pull --no-rebase origin main || true
          git diff --cached --quiet || git commit -m "Craigslist scrape: ${{ env.RUN_DATE }}"
          git push origin main || true
