name: Run Craigslist Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'    # 7:00 AM EDT = 11:00 UTC
    - cron: '45 21 * * *'   # 5:45 PM EDT = 21:45 UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Set run date
        run: |
          echo "RUN_DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "RUN_TIME=$(TZ='America/New_York' date +'%I:%M %p EDT')" >> $GITHUB_ENV

      - name: Notify start
        run: |
          python - <<'EOF'
          import urllib.request, urllib.parse, os
          token   = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"
          msg = (
            "🚀 Craigslist Scraper Started\n"
            "📅 Date: ${{ env.RUN_DATE }}\n"
            "⏰ Time: ${{ env.RUN_TIME }}\n"
            "🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          )
          if token and chat_id:
            data = urllib.parse.urlencode({"chat_id": chat_id, "text": msg}).encode()
            urllib.request.urlopen(f"https://api.telegram.org/bot{token}/sendMessage", data)
          EOF

      - name: Run scraper
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          RUN_DATE:  ${{ env.RUN_DATE }}
        run: python scraper.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: craigslist-${{ env.RUN_DATE }}
          path: |
            FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/CSV/
            FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/JSON/
            FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/craper.log
          retention-days: 90

      - name: Notify success
        if: success()
        run: |
          python - <<'EOF'
          import urllib.request, urllib.parse, csv, os
          token   = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"
          f = "FSBO/Craigslist/DATA/${{ env.RUN_DATE }}/CSV/craigslist_cars.csv"
          rows = sum(1 for _ in open(f)) - 1 if os.path.exists(f) else 0
          msg = (
            "✅ Scraper Completed!\n"
            "📅 Date: ${{ env.RUN_DATE }}\n"
            "⏰ Finished: ${{ env.RUN_TIME }}\n"
            f"🚗 Listings saved: {rows}\n"
            "📄 CSV + JSON in Artifacts\n"
            "🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          )
          if token and chat_id:
            data = urllib.parse.urlencode({"chat_id": chat_id, "text": msg}).encode()
            urllib.request.urlopen(f"https://api.telegram.org/bot{token}/sendMessage", data)
          EOF

      - name: Notify failure
        if: failure()
        run: |
          python - <<'EOF'
          import urllib.request, urllib.parse
          token   = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"
          msg = (
            "❌ Scraper FAILED!\n"
            "📅 Date: ${{ env.RUN_DATE }}\n"
            "⏰ Time: ${{ env.RUN_TIME }}\n"
            "⚠️ Check logs for details\n"
            "🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          )
          if token and chat_id:
            data = urllib.parse.urlencode({"chat_id": chat_id, "text": msg}).encode()
            urllib.request.urlopen(f"https://api.telegram.org/bot{token}/sendMessage", data)
          EOF
