name: Facebook Marketplace Scraper

on:
  schedule:
    - cron: "30 8 * * *"  # Daily at 8:30 AM UTC (4:30 AM EDT) — 30 min after Craigslist
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-facebook-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-facebook-

      - name: Install dependencies
        run: pip install apify-client

      - name: Set run date
        run: echo "RUN_DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run Facebook scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          RUN_DATE:        ${{ env.RUN_DATE }}
        run: python scrapers/fb_scraper.py

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-csv-${{ env.RUN_DATE }}
          path: FSBO/Facebook/DATA/${{ env.RUN_DATE }}/CSV/
          retention-days: 30

      - name: Upload JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-json-${{ env.RUN_DATE }}
          path: FSBO/Facebook/DATA/${{ env.RUN_DATE }}/JSON/
          retention-days: 30

      - name: Commit and push results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ✅ Stage files FIRST before pulling
          git add FSBO/Facebook/DATA/ || true

          # Pull with merge — no rebase conflict
          git pull --no-rebase origin main || true

          # Commit only if something changed
          git diff --cached --quiet || git commit -m "Facebook scrape: ${{ env.RUN_DATE }}"

          git push origin main || true
